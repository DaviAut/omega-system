<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA ÔMEGA — RAIDER.CORP.U</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

/* ══════════════════════════════════════════
   SCARLET THEME  —  preto + vermelho (padrão)
   ══════════════════════════════════════════ */
:root{
  --ac:#cc0000; --ac-b:#ff3333; --ac-d:rgba(180,0,0,.5); --ac-f:rgba(180,0,0,.1);
  --bg:#000; --bg2:#060000; --bg3:#0e0000;
  --sb-bg:rgba(5,0,0,.97); --sb-border:rgba(150,0,0,.3);
  --tb-bg:rgba(4,0,0,.95);  --tb-border:rgba(150,0,0,.25);
  --panel:rgba(8,0,0,.88);  --panel2:rgba(12,0,0,.85);
  --border:rgba(140,0,0,.28); --border2:rgba(200,0,0,.5);
  --txt:rgba(210,100,100,.82); --txt-b:#ff4444; --txt-dim:rgba(180,80,80,.55);
  --nav-txt:rgba(200,100,100,.6); --nav-hover:rgba(140,0,0,.12); --nav-active:rgba(140,0,0,.18);
  --sc-txt:#ff4444; --sc-border:rgba(140,0,0,.3);
  --entry-bg:rgba(8,0,0,.85); --entry-hover:rgba(200,0,0,.5);
  --modal-bg:#060000; --modal-border:var(--ac);
  --search-bg:rgba(10,0,0,.9); --search-border:rgba(150,0,0,.35);
  --input-bg:rgba(10,0,0,.95); --input-border:rgba(150,0,0,.4);
  --log-bg:rgba(6,0,0,.85);
  --grid-line:rgba(180,0,0,.05); --scanline:rgba(0,0,0,.12);
  --corner:rgba(160,0,0,.35);
  --hub-bg:radial-gradient(ellipse at 30% 20%,#0e0000 0%,#000 65%);
  --login-bg:radial-gradient(ellipse at center,#0a0000 0%,#000 70%);
  --boot-bg:#000; --console-txt:#cc4444; --console-dim:rgba(160,80,80,.6); --console-bright:#ff5555;
  --pbar-bg:var(--ac);
  --uc-name:#ee3333; --uc-role:rgba(180,80,80,.6);
  --sec-title:rgba(200,80,80,.7); --sec-line:rgba(150,0,0,.2);
  --logo-glow:rgba(180,0,0,.7); --logo-pulse1:rgba(180,0,0,.5); --logo-pulse2:rgba(220,0,0,1);
  --team-color:#cc0000;
  /* rarity */
  --c-common:#ffffff;--c-uncommon:#44ff88;--c-rare:#4488ff;--c-unique:#aa44ff;--c-omega:#ff8800;
  /* alias */
  --red:var(--ac); --red-b:var(--ac-b); --red-d:var(--ac-d);
}

/* ══════════════════════════════════════════
   IVORY THEME  —  preto + branco/prata
   ══════════════════════════════════════════ */
body.theme-ivory{
  --ac:#cccccc; --ac-b:#ffffff; --ac-d:rgba(200,200,200,.5); --ac-f:rgba(200,200,200,.07);
  --bg:#000; --bg2:#080808; --bg3:#101010;
  --sb-bg:rgba(8,8,8,.98); --sb-border:rgba(180,180,180,.2);
  --tb-bg:rgba(6,6,6,.96);  --tb-border:rgba(180,180,180,.15);
  --panel:rgba(10,10,10,.9);  --panel2:rgba(16,16,16,.88);
  --border:rgba(160,160,160,.22); --border2:rgba(220,220,220,.45);
  --txt:rgba(210,210,210,.8); --txt-b:#eeeeee; --txt-dim:rgba(180,180,180,.5);
  --nav-txt:rgba(190,190,190,.55); --nav-hover:rgba(180,180,180,.08); --nav-active:rgba(180,180,180,.14);
  --sc-txt:#dddddd; --sc-border:rgba(160,160,160,.25);
  --entry-bg:rgba(10,10,10,.88); --entry-hover:rgba(200,200,200,.4);
  --modal-bg:#080808; --modal-border:#999;
  --search-bg:rgba(12,12,12,.92); --search-border:rgba(160,160,160,.3);
  --input-bg:rgba(12,12,12,.96); --input-border:rgba(160,160,160,.35);
  --log-bg:rgba(8,8,8,.88);
  --grid-line:rgba(200,200,200,.04); --scanline:rgba(255,255,255,.025);
  --corner:rgba(180,180,180,.3);
  --hub-bg:radial-gradient(ellipse at 30% 20%,#0d0d0d 0%,#000 65%);
  --login-bg:radial-gradient(ellipse at center,#0c0c0c 0%,#000 70%);
  --boot-bg:#000; --console-txt:#aaaaaa; --console-dim:rgba(150,150,150,.55); --console-bright:#dddddd;
  --pbar-bg:#999;
  --uc-name:#cccccc; --uc-role:rgba(180,180,180,.55);
  --sec-title:rgba(200,200,200,.65); --sec-line:rgba(160,160,160,.18);
  --logo-glow:rgba(200,200,200,.6); --logo-pulse1:rgba(180,180,180,.4); --logo-pulse2:rgba(255,255,255,.9);
  --team-color:#aaaaaa;
  --red:var(--ac); --red-b:var(--ac-b); --red-d:var(--ac-d);
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:'Share Tech Mono','Courier New',monospace;cursor:default;user-select:none;}

/* overlays */
#scanlines{position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);}
.grid-bg{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),
  linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:50px 50px;}
.corner-deco{position:fixed;pointer-events:none;z-index:20;width:40px;height:40px;}
.corner-deco.tl{top:12px;left:12px;border-top:1px solid var(--corner);border-left:1px solid var(--corner);}
.corner-deco.tr{top:12px;right:12px;border-top:1px solid var(--corner);border-right:1px solid var(--corner);}
.corner-deco.bl{bottom:12px;left:12px;border-bottom:1px solid var(--corner);border-left:1px solid var(--corner);}
.corner-deco.br{bottom:12px;right:12px;border-bottom:1px solid var(--corner);border-right:1px solid var(--corner);}

/* screens */
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* ═══ LOGIN ═══ */
#screen-login{background:var(--login-bg);}
.login-wrap{display:flex;flex-direction:column;align-items:center;width:480px;animation:fadeUp .8s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo-zone{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;}
#logo-img{width:120px;height:auto;filter:drop-shadow(0 0 18px var(--logo-glow));animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 12px var(--logo-pulse1))}50%{filter:drop-shadow(0 0 28px var(--logo-pulse2))}}
.logo-fallback{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;color:var(--ac);
  letter-spacing:8px;text-shadow:0 0 30px var(--logo-glow);animation:logoPulse 3s ease-in-out infinite;}
#cred-img{width:100%;max-width:420px;margin-top:8px;}
.cred-fallback{text-align:center;margin-top:10px;}
.cred-fallback .main-txt{font-family:'Orbitron',sans-serif;font-size:18px;letter-spacing:5px;color:var(--ac-b);}
.cred-fallback .sub-txt{font-size:10px;letter-spacing:3px;color:var(--txt-dim);margin-top:4px;}
.login-panel{position:relative;width:100%;margin-top:8px;}
#border-img{width:100%;display:block;}
.border-fallback{border:2px solid var(--ac);border-radius:8px;background:var(--bg2);}
.fields-inner{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;padding:20px 36px;}
.fields-inner.fallback-mode{position:relative;padding:24px 36px;}
.field-row{position:relative;width:100%;}
.field-row img{width:100%;height:36px;object-fit:fill;display:block;}
.field-row input{position:absolute;inset:0;width:100%;height:100%;background:transparent;border:none;outline:none;
  color:var(--ac-b);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:3px;
  padding:0 10px 0 70px;text-transform:uppercase;caret-color:var(--ac-b);}
.field-row input::placeholder{color:var(--ac-d);letter-spacing:1px;}
.field-row.fallback-field input{position:relative;border:1px solid var(--ac);border-radius:3px;
  background:var(--bg2);padding:8px 10px 8px 60px;height:auto;}
.field-label-overlay{position:absolute;left:0;top:0;bottom:0;display:flex;align-items:center;
  background:var(--ac);padding:0 10px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  color:#000;letter-spacing:2px;z-index:2;border-radius:3px 0 0 3px;pointer-events:none;}
.err-msg{font-size:12px;letter-spacing:2px;color:#ff4444;text-align:center;min-height:14px;margin-top:-4px;}
.btn-access{background:transparent;border:2px solid var(--ac);color:var(--ac-b);
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:5px;
  padding:10px 50px;cursor:pointer;text-transform:uppercase;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all .15s;position:relative;overflow:hidden;}
.btn-access::before{content:'';position:absolute;inset:0;background:var(--ac);transform:translateX(-101%);transition:transform .15s;}
.btn-access:hover::before{transform:translateX(0);}
.btn-access:hover{color:#000;}
.btn-access span{position:relative;z-index:1;}
.login-footer{font-size:11px;letter-spacing:2px;color:var(--txt-dim);margin-top:14px;text-align:center;}
.blink{animation:blink 1.2s step-end infinite;}
@keyframes blink{50%{opacity:0}}

/* ═══ BOOT ═══ */
#screen-boot{background:var(--boot-bg);align-items:flex-start;justify-content:flex-start;padding:0;overflow:hidden;}
.boot-outer{width:100%;height:100%;overflow-y:auto;padding:40px 60px;scroll-behavior:smooth;}
.boot-outer::-webkit-scrollbar{width:3px;}
.boot-outer::-webkit-scrollbar-thumb{background:var(--ac-d);}
.console-wrap{width:100%;max-width:860px;}
.console-header{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:var(--ac);
  border-bottom:1px solid var(--ac-d);padding-bottom:10px;margin-bottom:16px;
  display:flex;justify-content:space-between;position:sticky;top:0;background:var(--boot-bg);z-index:5;padding-top:4px;}
#console-output{font-size:13px;line-height:1.9;color:var(--console-txt);}
.console-line{display:block;}
.console-line.dim{color:var(--console-dim);}
.console-line.bright{color:var(--console-bright);}
.console-line.green{color:#44ff88;}
.console-line.warn{color:#ffaa00;}
.pbar{display:inline-block;width:200px;height:10px;border:1px solid var(--ac-d);position:relative;vertical-align:middle;}
.pbar-fill{position:absolute;left:0;top:0;bottom:0;background:var(--pbar-bg);transition:width .05s linear;}
.console-prompt{display:flex;align-items:center;gap:6px;margin-top:16px;font-size:13px;color:var(--ac-b);padding-bottom:20px;}

/* ═══ HUB SHELL ═══ */
#screen-hub{background:var(--hub-bg);
  align-items:stretch;justify-content:stretch;flex-direction:row;padding:0;animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* sidebar */
.sidebar{width:220px;min-width:220px;background:var(--sb-bg);
  border-right:1px solid var(--sb-border);display:flex;flex-direction:column;}
.sidebar-logo{padding:16px;border-bottom:1px solid var(--sb-border);
  display:flex;flex-direction:column;align-items:center;gap:5px;}
.sidebar-logo img{width:56px;filter:drop-shadow(0 0 8px var(--logo-glow));}
.org-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:4px;color:var(--ac);}
.org-sub{font-size:8px;letter-spacing:2px;color:var(--txt-dim);text-align:center;}
.user-card{margin:10px;padding:10px 12px;border:1px solid var(--sb-border);background:var(--panel);}
.uc-name{font-size:13px;letter-spacing:1px;color:var(--uc-name);margin-bottom:3px;}
.uc-role{font-size:10px;letter-spacing:2px;color:var(--uc-role);}
.team-pill{display:inline-block;margin-top:4px;margin-right:4px;padding:2px 8px;font-size:8px;
  letter-spacing:3px;border:1px solid;font-family:'Orbitron',sans-serif;
  color:var(--team-color);border-color:var(--team-color);}
.access-pill{display:inline-block;margin-top:5px;padding:2px 8px;font-size:8px;
  letter-spacing:2px;border:1px solid;font-family:'Orbitron',sans-serif;}
.nav-section{padding:4px 0;flex:1;overflow-y:auto;}
.nav-section::-webkit-scrollbar{width:2px;}
.nav-section::-webkit-scrollbar-thumb{background:var(--ac-d);}
.nav-label{font-size:9px;letter-spacing:3px;color:var(--txt-dim);padding:8px 16px 2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;
  border-left:2px solid transparent;transition:all .12s;font-size:12px;letter-spacing:2px;color:var(--nav-txt);}
.nav-item:hover{background:var(--nav-hover);color:var(--ac-b);border-left-color:var(--ac);}
.nav-item.active{background:var(--nav-active);color:var(--ac-b);border-left-color:var(--ac-b);}
.nav-icon{font-size:13px;width:18px;text-align:center;}
.nav-sub{font-size:9px;letter-spacing:1px;color:var(--txt-dim);padding:2px 16px 6px 44px;line-height:1.4;}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--sb-border);}
.btn-logout-side{width:100%;background:transparent;border:1px solid var(--border);
  color:var(--txt-dim);font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:2px;padding:7px;cursor:pointer;transition:all .15s;text-align:center;}
.btn-logout-side:hover{border-color:var(--ac);color:var(--ac-b);}

/* main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:44px;min-height:44px;border-bottom:1px solid var(--tb-border);
  background:var(--tb-bg);display:flex;align-items:center;justify-content:space-between;padding:0 22px;}
.topbar-left{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:var(--ac);
  display:flex;align-items:center;gap:12px;}
.topbar-sep{color:var(--border);}
.topbar-right{display:flex;align-items:center;gap:18px;font-size:11px;letter-spacing:2px;color:var(--txt-dim);}
.status-dot{width:6px;height:6px;border-radius:50%;background:#44ff66;
  display:inline-block;margin-right:4px;box-shadow:0 0 6px #44ff66;}
.content-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
.content-area::-webkit-scrollbar{width:4px;}
.content-area::-webkit-scrollbar-thumb{background:var(--ac-d);}

/* ═══ COMMON UI ═══ */
.sec-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;
  color:var(--sec-title);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--sec-line);}
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{border:1px solid var(--sc-border);background:var(--panel);padding:13px 15px;position:relative;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);}
.sc-label{font-size:10px;letter-spacing:3px;color:var(--txt-dim);margin-bottom:6px;}
.sc-value{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--sc-txt);}
.sc-sub{font-size:10px;letter-spacing:1px;color:var(--txt-dim);margin-top:3px;}
.activity-log{border:1px solid var(--border);background:var(--log-bg);padding:12px 14px;}
.log-entry{display:flex;align-items:flex-start;gap:12px;padding:5px 0;
  border-bottom:1px solid var(--border);font-size:12px;}
.log-entry:last-child{border-bottom:none;}
.log-time{color:var(--txt-dim);min-width:52px;letter-spacing:1px;}
.log-text{color:var(--txt);letter-spacing:1px;}
.log-ok{color:rgba(80,200,110,.75);}
.log-warn{color:rgba(210,150,0,.8);}
.log-err{color:rgba(255,80,80,.85);}
.lvl-1{color:#4af;border-color:#4af;}.lvl-2{color:#4fa;border-color:#4fa;}
.lvl-3{color:#fa4;border-color:#fa4;}.lvl-4{color:#f44;border-color:#f44;}
.lvl-5{color:#f0f;border-color:#f0f;}

/* generic buttons */
.btn-red{background:transparent;border:1px solid var(--ac);color:var(--txt-b);
  font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;
  padding:7px 18px;cursor:pointer;transition:all .15s;}
.btn-red:hover{background:var(--ac);color:#000;}
.btn-sm{padding:5px 12px;font-size:11px;}
.btn-danger{border-color:rgba(255,60,60,.5);color:rgba(255,100,100,.8);}
.btn-danger:hover{background:rgba(255,50,50,.15);color:#ff5555;border-color:#ff5555;}

/* module entries */
.mod-view{display:flex;flex-direction:column;gap:14px;}
.mod-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.mod-search{background:var(--search-bg);border:1px solid var(--search-border);
  color:var(--txt-b);font-family:'Share Tech Mono',monospace;font-size:12px;
  letter-spacing:2px;padding:7px 12px;outline:none;width:260px;}
.mod-search::placeholder{color:var(--txt-dim);}
.mod-search:focus{border-color:var(--ac);}
.entries-list{display:flex;flex-direction:column;gap:6px;}
.entry-card{border:1px solid var(--border);background:var(--entry-bg);
  padding:13px 16px;display:flex;align-items:flex-start;gap:14px;transition:border-color .12s;}
.entry-card:hover{border-color:var(--entry-hover);}
.entry-body{flex:1;min-width:0;}
.entry-title{font-size:13px;letter-spacing:2px;color:var(--txt-b);margin-bottom:4px;}
.entry-meta{font-size:10px;letter-spacing:1px;color:var(--txt-dim);}
.entry-preview{font-size:11px;letter-spacing:1px;color:var(--txt);margin-top:5px;line-height:1.5;}
.entry-level-badge{font-size:8px;letter-spacing:1px;padding:2px 7px;border:1px solid;
  white-space:nowrap;font-family:'Orbitron',sans-serif;}
.entry-actions{display:flex;gap:6px;opacity:0;transition:opacity .12s;}
.entry-card:hover .entry-actions{opacity:1;}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt-dim);font-size:12px;letter-spacing:2px;}
.tag{display:inline-block;padding:1px 7px;border:1px solid var(--border);
  font-size:9px;letter-spacing:1px;color:var(--txt-dim);margin-right:4px;}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);
  display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--modal-bg);border:1px solid var(--modal-border);width:620px;max-height:85vh;
  overflow-y:auto;display:flex;flex-direction:column;}
.modal-box.wide{width:900px;}
.modal-box::-webkit-scrollbar{width:3px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--ac-d);}
.modal-header{padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--ac);
  position:sticky;top:0;background:var(--modal-bg);z-index:2;}
.modal-close{background:none;border:none;color:var(--txt-dim);font-size:18px;cursor:pointer;}
.modal-close:hover{color:var(--txt-b);}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--modal-bg);}
.form-row{margin-bottom:14px;}
.form-label{font-size:11px;letter-spacing:2px;color:var(--txt-dim);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--input-bg);
  border:1px solid var(--input-border);color:var(--txt-b);font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:1px;padding:8px 10px;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--ac);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-select option{background:var(--modal-bg);color:var(--txt-b);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* users table */
.users-table{width:100%;border-collapse:collapse;}
.users-table th{font-size:10px;letter-spacing:3px;color:var(--txt-dim);
  padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;}
.users-table td{font-size:12px;padding:10px;border-bottom:1px solid var(--border);
  letter-spacing:1px;color:var(--txt);}
.users-table tr:hover td{background:var(--panel);}
.full-log{display:flex;flex-direction:column;gap:3px;}
.full-log-entry{display:flex;align-items:flex-start;gap:12px;padding:6px 10px;
  border:1px solid var(--border);font-size:11px;color:var(--txt);}
.full-log-entry:hover{background:var(--panel);}

/* ═══ AGENT SHEET ═══ */
.agent-sheet{display:grid;grid-template-columns:1fr 1fr;gap:14px;height:100%;}
.sheet-panel{border:1px solid var(--border);background:var(--panel);padding:14px;}
.sheet-panel.full-width{grid-column:1/-1;}

/* info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-field{display:flex;flex-direction:column;gap:3px;}
.info-label{font-size:9px;letter-spacing:3px;color:var(--txt-dim);}
.info-value{font-size:13px;letter-spacing:2px;color:#ff4444;border-bottom:1px solid var(--border);
  padding-bottom:3px;min-height:22px;background:transparent;outline:none;
  font-family:'Share Tech Mono',monospace;width:100%;border-top:none;border-left:none;border-right:none;}
.info-value[readonly]{cursor:default;}

/* hex radar */
.hex-radar-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.hex-canvas{display:block;}
.attr-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
.attr-badge{display:flex;align-items:center;gap:5px;padding:3px 8px;
  border:1px solid rgba(150,0,0,.35);background:rgba(15,0,0,.8);}
.attr-name{font-size:9px;letter-spacing:2px;color:rgba(180,80,80,.7);}
.attr-val{font-family:'Orbitron',sans-serif;font-size:12px;color:#ff4444;font-weight:700;}

/* status bars */
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stat-lbl{font-size:11px;letter-spacing:2px;color:rgba(200,80,80,.8);width:90px;text-align:right;}
.stat-base{font-family:'Orbitron',sans-serif;font-size:13px;color:#ff4444;min-width:14px;}
.stat-plus{font-size:11px;color:rgba(160,60,60,.6);}
.stat-bonus{font-family:'Orbitron',sans-serif;font-size:13px;color:#ff6644;min-width:14px;}
.hp-ep-row{display:flex;gap:16px;align-items:center;margin-bottom:12px;}
.hp-box,.ep-box{display:flex;align-items:center;gap:5px;}
.hp-icon{font-size:18px;}
.hp-val{font-family:'Orbitron',sans-serif;font-size:14px;color:#ff3333;letter-spacing:1px;}
.level-tri{position:relative;width:100px;text-align:center;}
.level-num{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#ff3333;}
.exp-bar-wrap{width:100%;height:6px;border:1px solid rgba(150,0,0,.4);margin-top:6px;position:relative;}
.exp-bar-fill{position:absolute;left:0;top:0;bottom:0;background:var(--ac);transition:width .4s;}
.exp-label{font-size:10px;letter-spacing:1px;color:rgba(160,60,60,.6);margin-top:3px;text-align:center;}

/* skills */
.skill-slot{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;
  border:1px solid var(--border);margin-bottom:6px;background:var(--panel);}
.skill-slot.inactive{opacity:.4;}
.skill-bolt{width:32px;height:32px;border-radius:50%;background:var(--ac-f);
  border:2px solid var(--ac);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;}
.skill-text{flex:1;font-size:11px;letter-spacing:1px;color:rgba(200,100,100,.75);line-height:1.5;}
.skill-name{font-size:12px;letter-spacing:2px;color:var(--ac-b);margin-bottom:3px;}

/* equipment */
.equip-layout{display:flex;gap:14px;}
.equip-body-col{flex:0 0 200px;display:flex;flex-direction:column;align-items:center;}
.equip-slots-col{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.body-figure{position:relative;width:160px;height:200px;}
.body-svg{width:100%;height:100%;}
.equip-slot{display:flex;align-items:center;gap:8px;padding:7px 10px;
  border:1px solid var(--border);background:var(--panel2);cursor:pointer;transition:all .12s;}
.equip-slot:hover{border-color:rgba(200,0,0,.5);}
.equip-slot.has-item{border-color:rgba(180,0,0,.5);}
.slot-icon{width:26px;height:26px;border-radius:50%;background:var(--ac-f);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;}
.slot-info{flex:1;min-width:0;}
.slot-name{font-size:9px;letter-spacing:2px;color:var(--txt-dim);}
.slot-item{font-size:11px;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* rarity colors */
.rarity-common  {color:var(--c-common);}
.rarity-uncommon{color:var(--c-uncommon);}
.rarity-rare    {color:var(--c-rare);}
.rarity-unique  {color:var(--c-unique);}
.rarity-omega   {color:var(--c-omega);}
.border-common  {border-color:rgba(255,255,255,.4);}
.border-uncommon{border-color:rgba(68,255,136,.5);}
.border-rare    {border-color:rgba(68,136,255,.5);}
.border-unique  {border-color:rgba(170,68,255,.5);}
.border-omega   {border-color:rgba(255,136,0,.5);}
.bg-common  {background:rgba(255,255,255,.08);}
.bg-uncommon{background:rgba(68,255,136,.08);}
.bg-rare    {background:rgba(68,136,255,.08);}
.bg-unique  {background:rgba(170,68,255,.1);}
.bg-omega   {background:rgba(255,136,0,.1);}

/* inventory */
.inv-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.inv-filter-btn{background:transparent;border:1px solid rgba(140,0,0,.35);
  color:rgba(180,80,80,.7);font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;padding:4px 10px;cursor:pointer;transition:all .12s;}
.inv-filter-btn.active,.inv-filter-btn:hover{background:rgba(140,0,0,.2);color:#ff4444;border-color:var(--red);}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;}
.inv-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  border:1px solid;background:rgba(8,0,0,.85);cursor:pointer;transition:all .12s;position:relative;}
.inv-item:hover{filter:brightness(1.15);}
.inv-item-icon{width:44px;height:44px;border-radius:8px;border:2px solid;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.inv-item-body{flex:1;min-width:0;}
.inv-item-name{font-size:12px;letter-spacing:1px;margin-bottom:3px;font-weight:bold;}
.inv-item-rarity{font-size:9px;letter-spacing:2px;margin-bottom:4px;opacity:.8;}
.inv-item-desc{font-size:10px;letter-spacing:.5px;color:rgba(200,150,150,.65);line-height:1.4;}
.inv-equip-badge{position:absolute;top:6px;right:8px;font-size:8px;letter-spacing:1px;
  color:#000;background:var(--ac);padding:1px 5px;}

/* historic / misc text areas */
.sheet-textarea{width:100%;background:transparent;border:none;outline:none;
  color:var(--txt);font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:1px;line-height:1.7;resize:none;
  border-bottom:1px solid rgba(150,0,0,.2);}
.sheet-textarea[readonly]{cursor:default;}

/* misc section */
.historic-text{font-size:11px;letter-spacing:.5px;color:rgba(200,100,100,.75);line-height:1.7;}

/* admin edit highlight */
.admin-editable{cursor:text !important;border-bottom:1px dashed var(--ac-d) !important;}
.admin-editable:focus{background:var(--panel) !important;padding-left:4px;}

/* dashboard modules grid */
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.module-tile{border:1px solid var(--border);background:var(--entry-bg);
  padding:14px 16px;cursor:pointer;position:relative;transition:all .15s;}
.module-tile:hover{border-color:var(--red);background:rgba(14,0,0,.9);}
.mt-icon{font-size:18px;margin-bottom:6px;}
.mt-name{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--ac-b);margin-bottom:4px;}
.mt-desc{font-size:10px;letter-spacing:1px;color:var(--txt-dim);line-height:1.4;}
.full-log-entry{display:flex;align-items:flex-start;gap:12px;padding:6px 10px;
  border:1px solid rgba(100,0,0,.12);font-size:11px;color:rgba(190,90,90,.75);}
.full-log-entry:hover{background:rgba(20,0,0,.5);}
</style>

function applyTheme(user){
  const cls=TEAM_THEMES[user.team]||'';

let currentUser=null,loginTime=null,sessionInterval=null,bootClockInterval=null,currentSection='agente';

// ═══ LOGIN ═══
function doLogin(){
  const id=document.getElementById('inputID').value.trim().toUpperCase();
  const code=document.getElementById('inputCode').value.trim();
  const err=document.getElementById('err-msg');
  const user=DB.users.find(u=>u.id===id&&u.code===code);
  if(!user){
    err.textContent='⚠  CREDENCIAIS INVÁLIDAS — ACESSO NEGADO';
    addLog(id||'???','Tentativa de acesso negada','err');
    document.getElementById('inputCode').value='';
    setTimeout(()=>err.textContent='',3500);return;
  }
  currentUser=user; loginTime=new Date();
  applyTheme(user);
  addLog(user.id,'Login efetuado','ok');
  showScreen('screen-boot'); startBoot();

function startBoot(){
  const out=document.getElementById('console-output');
  out.innerHTML=''; document.getElementById('console-prompt').style.display='none';
  let s=Date.now();
  bootClockInterval=setInterval(()=>{
    const e=Math.floor((Date.now()-s)/1000);
    document.getElementById('boot-clock').textContent=`00:${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  },1000);
  BOOT_SEQ.forEach(step=>setTimeout(()=>execBootStep(step,out),step.delay));
}
function addLine(container,text,cls){
  const s=document.createElement('span');
  s.className='console-line'+(cls?' '+cls:''); s.textContent=text;
  container.appendChild(s); container.appendChild(document.createElement('br'));
  const o=document.getElementById('boot-outer'); if(o)o.scrollTop=o.scrollHeight;
}
function execBootStep(step,out){
  const u=currentUser;
  if(step.text!==null&&!step.type){addLine(out,step.text,step.cls);return;}
  if(!u)return;
  switch(step.type){
    case 'db-count': addLine(out,`[ OK   ] ${DB.users.length} usuários | ${Object.values(DB.entries).flat().length} entradas carregados`,'green');break;
    case 'user-verify': addLine(out,`[ AUTH ] Agente identificado: ${u.id} — ${u.name}`,'bright');break;
    case 'access-level': addLine(out,`[ AUTH ] Nível de acesso: ${LEVEL_LABELS[u.level]}`,'bright');break;
    case 'module-load':{
      NAV_DEFS.filter(n=>canAccess(n.section)).forEach((n,i)=>
        setTimeout(()=>addLine(out,`[ OK   ] Módulo carregado: ${SECTION_LABELS[n.section]}`,'green'),i*80));
      break;
    }
    case 'sheet-load':{
      if(!u.isAdmin&&DB.sheets[u.id]) addLine(out,`[ OK   ] Ficha do agente ${u.id} carregada`,'green');
      else if(u.isAdmin) addLine(out,`[ OK   ] Acesso total às fichas concedido`,'green');
      break;
    }
    case 'progress':{
      const w=document.createElement('span'); w.className='console-line';
      w.innerHTML='Carregando interface: <span class="pbar"><span class="pbar-fill" id="pbar-fill" style="width:0%"></span></span> <span id="pbar-pct">0%</span>';
      out.appendChild(w); out.appendChild(document.createElement('br'));
      let pct=0; const pi=setInterval(()=>{
        pct=Math.min(pct+Math.random()*9+2,100);
        const f=document.getElementById('pbar-fill'),t=document.getElementById('pbar-pct');
        if(f)f.style.width=pct.toFixed(0)+'%'; if(t)t.textContent=pct.toFixed(0)+'%';
        const o=document.getElementById('boot-outer'); if(o)o.scrollTop=o.scrollHeight;
        if(pct>=100)clearInterval(pi);
      },70);break;
    }
    case 'launch':{
      clearInterval(bootClockInterval);
      const p=document.getElementById('console-prompt'); p.style.display='flex';
      const txt=`iniciando hub — agente ${u.id}`;let i=0;
      const ti=setInterval(()=>{
        document.getElementById('prompt-text').textContent=txt.slice(0,i++);
        const o=document.getElementById('boot-outer'); if(o)o.scrollTop=o.scrollHeight;
        if(i>txt.length){clearInterval(ti);setTimeout(()=>{showScreen('screen-hub');buildHub();startSessionTimer();},700);}
      },40);break;
    }
  }
}

// ═══ ACCESS ═══
function canAccess(section){
  if(!currentUser)return false;
  if(currentUser.isAdmin)return true;
  return currentUser.level>=(SECTION_MIN[section]||99);
}
function isAdmin(){return currentUser&&currentUser.isAdmin;}

// ═══ HUB ═══
function buildHub(){
  const u=currentUser;
  document.getElementById('hub-username').textContent=u.name;
  document.getElementById('hub-role').textContent=u.role;
  const pill=document.getElementById('hub-pill');
  pill.textContent=LEVEL_LABELS[u.level]; pill.className='access-pill '+LEVEL_CLASSES[u.level];
  // team pill
  let tp=document.getElementById('hub-team-pill');
  if(!tp){tp=document.createElement('div');tp.id='hub-team-pill';tp.className='team-pill';
    document.getElementById('hub-pill').parentNode.insertBefore(tp,document.getElementById('hub-pill'));}
  tp.textContent=u.team||'—';
  document.getElementById('topbar-user').textContent=u.id;
  updateTopbarTime(); setInterval(updateTopbarTime,1000);
  buildNav(); navigate('agente');
}
function buildNav(){
  const nav=document.getElementById('nav-section');
  nav.innerHTML='<div class="nav-label">NAVEGAÇÃO</div>';
  NAV_DEFS.forEach(item=>{
    if(!canAccess(item.section))return;
    const d=document.createElement('div');
    d.className='nav-item'; d.dataset.section=item.section;
    d.innerHTML=`<span class="nav-icon">${item.icon}</span><span>${item.label}</span>`;
    d.onclick=()=>navigate(item.section); nav.appendChild(d);
  });
}
function navigate(section){
  if(!canAccess(section))return;
  currentSection=section;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.section===section));
  document.getElementById('topbar-module').textContent=SECTION_LABELS[section]||section;
  addLog(currentUser.id,`Acessou: ${SECTION_LABELS[section]}`,'ok');
  const area=document.getElementById('content-area'); area.innerHTML='';
  switch(section){
    case 'agente':     renderAgentSheet(area);break;
    case 'dashboard':  renderDashboard(area);break;
    case 'arquivos':   renderEntries(area,'arquivos');break;
    case 'relatorios': renderEntries(area,'relatorios');break;
    case 'intel':      renderEntries(area,'intel');break;
    case 'dossies':    renderEntries(area,'dossies');break;
    case 'opsNegras':  renderEntries(area,'opsNegras');break;
    case 'controle':   renderControle(area);break;
    case 'adminPanel': renderAdminPanel(area);break;
  }
}
function updateTopbarTime(){const el=document.getElementById('topbar-time');if(el)el.textContent=new Date().toLocaleTimeString('pt-BR');}
function startSessionTimer(){
  clearInterval(sessionInterval);
  sessionInterval=setInterval(()=>{
    if(!loginTime)return;
    const d=Math.floor((Date.now()-loginTime)/1000);
    const el=document.getElementById('session-timer');
    if(el)el.textContent=`${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
  },1000);
}

// ── HEX RADAR ──
function drawHexRadar(uid){
  const canvas=document.getElementById('hex-canvas-'+uid);
  if(!canvas)return;
  const sheet=getSheet(uid);if(!sheet)return;
  const ctx=canvas.getContext('2d');
  const W=240,H=220,cx=W/2,cy=H/2,R=90;
  const attrs=['str','agi','rst','rsl','cha','wil'];
  const labels=['STR','AGI','RST','RSL','CHA','WIL'];
  const vals=attrs.map(a=>Math.max(0,Math.min(5,sheet.potential[a]||0))/5);
  ctx.clearRect(0,0,W,H);

  // grid hexagons
  for(let r=1;r<=5;r++){
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const ang=Math.PI/180*(60*i-90);
      const x=cx+R*(r/5)*Math.cos(ang),y=cy+R*(r/5)*Math.sin(ang);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=`rgba(${getComputedStyle(document.documentElement).getPropertyValue('--ac-b').trim()||'255,60,60'},${r===5?0.35:0.12})`;
    ctx.lineWidth=r===5?1.5:0.8;
    ctx.stroke();
  }
  // spokes
  for(let i=0;i<6;i++){
    const ang=Math.PI/180*(60*i-90);
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(ang),cy+R*Math.sin(ang));
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'rgba(150,0,0,.2)';ctx.lineWidth=0.8;ctx.stroke();
  }
  // filled area
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const ang=Math.PI/180*(60*i-90);
    const x=cx+R*vals[i]*Math.cos(ang),y=cy+R*vals[i]*Math.sin(ang);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--ac-f').trim()||'rgba(200,0,0,.25)';ctx.fill();
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--ac-b').trim()||'rgba(255,50,50,.8)';ctx.lineWidth=2;ctx.stroke();
  // dots
  for(let i=0;i<6;i++){
    const ang=Math.PI/180*(60*i-90);
    const x=cx+R*vals[i]*Math.cos(ang),y=cy+R*vals[i]*Math.sin(ang);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--ac-b').trim()||'#ff3333';ctx.fill();
  }
  // labels
  ctx.font='bold 10px Orbitron,sans-serif';ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--txt-b').trim()||'rgba(220,100,100,.9)';ctx.textAlign='center';
  for(let i=0;i<6;i++){
    const ang=Math.PI/180*(60*i-90);
    const x=cx+(R+18)*Math.cos(ang),y=cy+(R+18)*Math.sin(ang)+4;
    ctx.fillText(labels[i],x,y);
  }
  // attr badges
  const badgeEl=document.getElementById('attr-badges-'+uid);
  if(badgeEl)renderAttrBadges(uid,badgeEl);
}
function renderAttrBadges(uid,el){
  const s=getSheet(uid);if(!s)return;
  el.innerHTML=['str','agi','wil','cha','rst','rsl'].map(a=>`
    <div class="attr-badge">
      <span class="attr-name">${a.toUpperCase()}</span>
      <span class="attr-val">${s.potential[a]||0}</span>
    </div>`).join('');
}

function equipItem(uid,slotId,itemId){
  const sheet=getSheet(uid);if(!sheet)return;
  const item=sheet.inventory.find(i=>i.id===itemId);
  if(!item)return;
  // unequip from any current slot
  Object.keys(sheet.equipment).forEach(k=>{if(sheet.equipment[k]&&sheet.equipment[k].id===itemId)sheet.equipment[k]=null;});
  sheet.equipment[slotId]=item;
  addLog(currentUser.id,`Equipou ${item.name} em ${slotId} de ${uid}`,'ok');
  closeModal(); navigate('agente');
  setTimeout(()=>switchTab(document.querySelector('.sheet-tab[data-tab="equipment"]'),'equipment'),100);
}

}

  const sheet=getSheet(uid);if(!sheet)return;

}

function renderEntries(area,section){
  const entries=DB.entries[section]||[];
  const canEdit=isAdmin();
  function render(filter=''){
    area.innerHTML='';
    const wrap=document.createElement('div'); wrap.className='mod-view';
    const toolbar=document.createElement('div'); toolbar.className='mod-toolbar';
    toolbar.innerHTML=`<input class="mod-search" id="search-${section}" type="text" placeholder="BUSCAR..." value="${filter}">
      ${canEdit?`<button class="btn-red" onclick="openCreateEntry('${section}')">+ NOVA ENTRADA</button>`:''}`;
    wrap.appendChild(toolbar);
    const list=document.createElement('div'); list.className='entries-list';
    const filtered=entries.filter(e=>
      e.title.toLowerCase().includes(filter.toLowerCase())||
      e.content.toLowerCase().includes(filter.toLowerCase()));
    if(filtered.length===0)list.innerHTML='<div class="empty-state">NENHUMA ENTRADA</div>';
    else filtered.forEach(e=>{
      const card=document.createElement('div'); card.className='entry-card';
      card.innerHTML=`<div class="entry-body">
          <div class="entry-title">${e.title}</div>
          <div class="entry-meta">ID: ${e.id} | AUTOR: ${e.author} | DATA: ${e.date}</div>
          <div class="entry-preview">${e.content.substring(0,120)}${e.content.length>120?'…':''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="entry-level-badge lvl-${e.level}">NÍV.${e.level}</span>
          <div class="entry-actions">
            <button class="btn-red btn-sm" onclick="openViewEntry('${section}','${e.id}')">VER</button>
            ${canEdit?`<button class="btn-red btn-sm" onclick="openEditEntry('${section}','${e.id}')">✎</button>
            <button class="btn-red btn-sm btn-danger" onclick="deleteEntry('${section}','${e.id}')">✕</button>`:''}
          </div>
        </div>`;
      list.appendChild(card);
    });
    wrap.appendChild(list); area.appendChild(wrap);
    const s=document.getElementById(`search-${section}`);
    if(s)s.addEventListener('input',ev=>render(ev.target.value));
  }
  render();
}

function submitCreateEntry(section){
  const title=document.getElementById('f-title').value.trim();
  const level=parseInt(document.getElementById('f-level').value)||1;
  const content=document.getElementById('f-content').value.trim();
  const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!title||!content){alert('Preencha título e conteúdo.');return;}
  const prefix={arquivos:'A',relatorios:'R',intel:'I',dossies:'D',opsNegras:'ON',controle:'C'}[section]||'X';
  const id=prefix+Date.now().toString().slice(-4);
  if(!DB.entries[section])DB.entries[section]=[];
  DB.entries[section].push({id,title:title.toUpperCase(),level,author:currentUser.id,
    date:new Date().toISOString().split('T')[0],tags,content});
  addLog(currentUser.id,`Criou entrada ${id}`,'ok');
  closeModal(); navigate(section);

      <div class="form-row"><label class="form-label">TAGS</label><input class="form-input" id="f-tags" value="${(e.tags||[]).join(', ')}"></div>
    </div>
    <div class="form-row"><label class="form-label">CONTEÚDO</label>
      <textarea class="form-textarea" id="f-content" style="min-height:120px">${e.content}</textarea></div>`,
  `<button class="btn-red btn-sm" onclick="submitEditEntry('${section}','${id}')">SALVAR</button>
   <button class="btn-red btn-sm btn-danger" onclick="closeModal()">CANCELAR</button>`);
}
function submitEditEntry(section,id){
  const e=(DB.entries[section]||[]).find(x=>x.id===id);if(!e)return;
  e.title=(document.getElementById('f-title').value.trim()||e.title).toUpperCase();
  e.level=parseInt(document.getElementById('f-level').value)||e.level;
  e.content=document.getElementById('f-content').value.trim()||e.content;
  e.tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  addLog(currentUser.id,`Editou entrada ${id}`,'ok');
  closeModal(); navigate(section);
}
function deleteEntry(section,id){
  if(!confirm(`Excluir ${id}?`))return;
  DB.entries[section]=(DB.entries[section]||[]).filter(e=>e.id!==id);
  addLog(currentUser.id,`Excluiu ${id}`,'warn');
  navigate(section);
}

// ═══ CONTROLE ═══
function renderControle(area){
  area.innerHTML=`
    <div><div class="sec-title">CONTROLE CENTRAL</div>
      <div class="cards-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="sc-label">USUÁRIOS</div>
          <div class="sc-value">${DB.users.filter(u=>!u.isAdmin).length}</div></div>
        <div class="stat-card"><div class="sc-label">ENTRADAS</div>
          <div class="sc-value">${Object.values(DB.entries).flat().length}</div></div>
        <div class="stat-card"><div class="sc-label">LOGS</div>
          <div class="sc-value">${DB.accessLog.length}</div></div>
      </div></div>
    <div><div class="sec-title">LOG RECENTE</div>
      <div class="full-log">
        ${DB.accessLog.slice(0,20).map(l=>`
          <div class="full-log-entry">
            <span style="min-width:130px;color:var(--txt-dim)">${l.time}</span>
            <span style="min-width:100px;color:var(--txt-dim)">${l.user}</span>
            <span class="log-${l.type}">${l.action}</span>
          </div>`).join('')}
      </div></div>`;
}

// ═══ ADMIN PANEL ═══
function renderAdminPanel(area){
  const regular=DB.users.filter(u=>!u.isAdmin);
  area.innerHTML=`
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="sec-title" style="margin-bottom:0">GERENCIAR USUÁRIOS</div>
        <button class="btn-red" onclick="openCreateUser()">+ NOVO USUÁRIO</button>
      </div>
      <div style="border:1px solid var(--border);background:var(--log-bg)">
        <table class="users-table">
          <thead><tr><th>ID</th><th>NOME</th><th>CARGO</th><th>EQUIPE</th><th>NÍVEL</th><th>FICHA</th><th>AÇÕES</th></tr></thead>
          <tbody>
            ${regular.map(u=>`<tr>
              <td>${u.id}</td><td>${u.name}</td><td>${u.role}</td>
              <td><span class="team-pill" style="margin-top:0">${u.team||'—'}</span></td>
              <td><span class="access-pill ${LEVEL_CLASSES[u.level]}">${LEVEL_LABELS[u.level]}</span></td>
              <td><button class="btn-red btn-sm" onclick="adminViewSheet('${u.id}');navigate('agente')">VER FICHA</button></td>
              <td style="display:flex;gap:6px">
                <button class="btn-red btn-sm" onclick="openEditUser('${u.id}')">EDITAR</button>
                <button class="btn-red btn-sm btn-danger" onclick="deleteUser('${u.id}')">DEL</button>
              </td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div>
      <div class="sec-title">LOG COMPLETO</div>
      <div class="full-log">
        ${DB.accessLog.slice(0,50).map(l=>`
          <div class="full-log-entry">
            <span style="min-width:130px;color:rgba(150,60,60,.6)">${l.time}</span>
            <span style="min-width:100px;color:rgba(180,80,80,.6)">${l.user}</span>
            <span class="log-${l.type}">${l.action}</span>
          </div>`).join('')}
      </div>
    </div>`;
}
function openCreateUser(){
  openModal('CRIAR USUÁRIO',`
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">ID</label><input class="form-input" id="u-id" placeholder="EX: THETA-03"></div>
      <div class="form-row"><label class="form-label">CÓDIGO</label><input class="form-input" id="u-code" placeholder="Senha"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">NOME</label><input class="form-input" id="u-name" placeholder="Nome"></div>
      <div class="form-row"><label class="form-label">CARGO</label><input class="form-input" id="u-role" placeholder="Cargo"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">EQUIPE</label>
        <select class="form-select" id="u-team">
          <option value="SCARLET">SCARLET</option>
          <option value="IVORY">IVORY</option>
        </select></div>
      <div class="form-row"><label class="form-label">NÍVEL (1-5)</label>
        <select class="form-select" id="u-level">
          ${[1,2,3,4,5].map(n=>`<option value="${n}">${n} — ${LEVEL_LABELS[n]}</option>`).join('')}
        </select></div>
    </div>`,
  `<button class="btn-red btn-sm" onclick="submitCreateUser()">CRIAR</button>
   <button class="btn-red btn-sm btn-danger" onclick="closeModal()">CANCELAR</button>`);
}
function submitCreateUser(){
  const id=document.getElementById('u-id').value.trim().toUpperCase();
  const code=document.getElementById('u-code').value.trim();
  const name=document.getElementById('u-name').value.trim();
  const role=document.getElementById('u-role').value.trim().toUpperCase();
  const level=parseInt(document.getElementById('u-level').value)||1;
  const team=document.getElementById('u-team').value||'SCARLET';
  if(!id||!code||!name||!role){alert('Preencha todos os campos.');return;}
  if(DB.users.find(u=>u.id===id)){alert('ID já existe.');return;}
  DB.users.push({id,code,name,role,level,team});
  DB.sheets[id]=mkSheet(id);
  addLog(currentUser.id,`Criou usuário ${id} [${team}]`,'ok');
  closeModal(); navigate('adminPanel');
}
function openEditUser(uid){
  const u=DB.users.find(x=>x.id===uid);if(!u)return;
  openModal(`EDITAR — ${u.id}`,`
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">NOME</label><input class="form-input" id="u-name" value="${u.name}"></div>
      <div class="form-row"><label class="form-label">CARGO</label><input class="form-input" id="u-role" value="${u.role}"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">NOVO CÓDIGO (vazio=manter)</label><input class="form-input" id="u-code" placeholder="Nova senha"></div>
      <div class="form-row"><label class="form-label">EQUIPE</label>
        <select class="form-select" id="u-team">
          <option value="SCARLET" ${(u.team||'SCARLET')==='SCARLET'?'selected':''}>SCARLET</option>
          <option value="IVORY" ${u.team==='IVORY'?'selected':''}>IVORY</option>
        </select></div>
    </div>
    <div class="form-row"><label class="form-label">NÍVEL</label>
      <select class="form-select" id="u-level">
        ${[1,2,3,4,5].map(n=>`<option value="${n}" ${u.level===n?'selected':''}>${n} — ${LEVEL_LABELS[n]}</option>`).join('')}
      </select></div>`,
  `<button class="btn-red btn-sm" onclick="submitEditUser('${uid}')">SALVAR</button>
   <button class="btn-red btn-sm btn-danger" onclick="closeModal()">CANCELAR</button>`);
}
function submitEditUser(uid){
  const u=DB.users.find(x=>x.id===uid);if(!u)return;
  u.name=document.getElementById('u-name').value.trim()||u.name;
  u.role=document.getElementById('u-role').value.trim().toUpperCase()||u.role;
  u.level=parseInt(document.getElementById('u-level').value)||u.level;
  u.team=document.getElementById('u-team').value||u.team;
  const nc=document.getElementById('u-code').value.trim();if(nc)u.code=nc;
  addLog(currentUser.id,`Editou usuário ${uid}`,'ok');
  closeModal(); navigate('adminPanel');
}
function deleteUser(uid){
  if(!confirm(`Excluir usuário ${uid}?`))return;
  DB.users=DB.users.filter(u=>u.id!==uid);
  delete DB.sheets[uid];
  addLog(currentUser.id,`Excluiu usuário ${uid}`,'warn');
  navigate('adminPanel');
}

// ═══ MODAL ═══
function openModal(title,body,footer=''){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
document.getElementById('modal-bg').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-bg'))closeModal();
});
</script>
</body>
</html>
